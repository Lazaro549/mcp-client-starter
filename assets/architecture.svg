<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>MCP client and server architecture</title>
<desc>Diagram showing how a user question flows through an MCP client into Claude, which can call tools on an MCP server connected over stdio, with results flowing back.</desc>
<defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.th { font-size: 14px; font-weight: 500; }
.t { font-size: 14px; font-weight: 400; }
.ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
.box { fill: #ffffff; stroke: #888780; }
.arr { stroke: #5f5e5a; stroke-width: 1.5; fill: none; }
.c-teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal-text { fill: #04342C; }
.c-blue-fill { fill: #E6F1FB; stroke: #185FA5; }
.c-blue-text { fill: #042C53; }
.c-purple-fill { fill: #EEEDFE; stroke: #534AB7; }
.c-purple-text { fill: #26215C; }
.c-coral-fill { fill: #FAECE7; stroke: #993C1D; }
.c-coral-text { fill: #4A1B0C; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5f5e5a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="ts" x="40" y="32" fill="#2c2c2a">1. User asks a question</text>
<line x1="200" y1="40" x2="200" y2="70" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="80" width="290" height="220" rx="20" class="c-teal-fill" stroke-width="0.5"/>
<text class="th c-teal-text" x="80" y="106">Client process (Node.js)</text>

<rect x="90" y="125" width="230" height="56" rx="10" class="c-blue-fill" stroke-width="0.5"/>
<text class="th c-blue-text" x="205" y="145" text-anchor="middle" dominant-baseline="central">MCP client</text>
<text class="ts" x="205" y="163" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Discovers and calls server tools</text>

<line x1="205" y1="181" x2="205" y2="206" class="arr" marker-end="url(#arrow)"/>

<rect x="90" y="210" width="230" height="56" rx="10" class="c-purple-fill" stroke-width="0.5"/>
<text class="th c-purple-text" x="205" y="230" text-anchor="middle" dominant-baseline="central">Claude (Anthropic API)</text>
<text class="ts" x="205" y="248" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Decides when to call a tool</text>

<line x1="350" y1="160" x2="430" y2="160" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="390" y="148" text-anchor="middle" fill="#2c2c2a">stdio</text>
<line x1="430" y1="220" x2="350" y2="220" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="390" y="208" text-anchor="middle" fill="#2c2c2a">result</text>

<rect x="430" y="80" width="190" height="220" rx="20" class="c-coral-fill" stroke-width="0.5"/>
<text class="th c-coral-text" x="450" y="106">Server process</text>

<rect x="450" y="130" width="150" height="44" rx="8" class="c-coral-fill" stroke-width="0.5"/>
<text class="t c-coral-text" x="525" y="152" text-anchor="middle" dominant-baseline="central">get_current_time</text>

<rect x="450" y="186" width="150" height="44" rx="8" class="c-coral-fill" stroke-width="0.5"/>
<text class="t c-coral-text" x="525" y="208" text-anchor="middle" dominant-baseline="central">calculate</text>

<text class="ts" x="525" y="252" text-anchor="middle">MCP server</text>
<text class="ts" x="525" y="266" text-anchor="middle">exposes tools</text>

<line x1="205" y1="316" x2="205" y2="340" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="40" y="358" fill="#2c2c2a">2. Claude returns a final answer</text>
</svg>
